<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>КИРИЛЛ КУЗИН | РЕЖИССЕР</title>
    <style>
        * { box-sizing: border-box; }
        body, html {
            margin: 0; 
            padding: 0;
            background-color: #000 !important;
            color: #fff;
            font-family: 'Arial Black', 'Arial', sans-serif;
            text-transform: uppercase;
            overflow-x: hidden;
        }
        header {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            background: #000;
        }
        h1 { font-size: 15vw; line-height: 0.8; margin: 0; letter-spacing: -5px; }
        .red { color: #ff0000; }
        .project {
            height: 100vh;
            border-top: 5px solid #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #000;
            padding: 20px;
        }
        .year { color: #ff0000; font-size: 2rem; margin-bottom: 10px; }
        .title { font-size: 8vw; text-align: center; margin: 0; line-height: 1; }
        footer { 
            padding: 100px 20px; 
            text-align: center; 
            background: #fff; 
            color: #000; 
        }
        .mail { font-size: 7vw; color: #000; text-decoration: none; font-weight: 900; display: block; margin-top: 20px; }
    </style>
</head>
<body>
    <header>
        <h1>КИРИЛЛ<br><span class="red">КУЗИН</span></h1>
    </header>

    <section class="project">
        <div class="year">2025</div>
        <h2 class="title">ПИСЬМО ДЕДУ МОРОЗУ</h2>
    </section>

    <section class="project">
        <div class="year">2025</div>
        <h2 class="title">СЕРГИЙ ПРОТИВ НЕЧИСТИ</h2>
    </section>

    <section class="project">
        <div class="year">2005</div>
        <h2 class="title">КЛУБ</h2>
    </section>

    <footer>
        <div style="font-size: 1.5rem;">ЕСТЬ РАБОТА? ПИШИ!</div>
        <a href="mailto:director@example.com" class="mail">KUZIN.DIRECTOR</a>
    </footer>
</body>
</html>
