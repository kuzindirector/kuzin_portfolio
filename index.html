<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KIRILL KUZIN | DIRECTOR'S CUT</title>
    <style>
        :root {
            --bg: #000;
            --accent: #ff0000;
            --text: #fff;
        }

        body, html {
            margin: 0; padding: 0;
            background: var(--bg);
            color: var(--text);
            font-family: 'Arial Black', 'Arial Bold', sans-serif;
            text-transform: uppercase;
            font-weight: 900;
            overflow-x: hidden;
        }

        .grain {
            position: fixed; top: -50%; left: -50%; width: 200%; height: 200%;
            background-image: url("data:image/svg+xml,%3Fxml version='1.0' encoding='UTF-8'%3F%3E%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
            opacity: 0.04; z-index: 1000; pointer-events: none; animation: noise-anim 0.2s infinite;
        }
        @keyframes noise-anim {
            0% { transform: translate(0,0) }
            10% { transform: translate(-5%,-5%) }
            20% { transform: translate(-10%,5%) }
            100% { transform: translate(5%,0) }
        }

        header {
            height: 100vh; display: flex; align-items: center; justify-content: center;
            position: sticky; top: 0; z-index: 0; background: var(--bg);
        }

        h1 { font-size: 13vw; line-height: 0.8; text-align: center; margin: 0; letter-spacing: -6px; }

        .project {
            position: relative; height: 100vh; width: 100%; display: flex;
            align-items: center; justify-content: center; overflow: hidden;
            border-bottom: 4px solid var(--text); z-index: 10; background: var(--bg);
        }

        .project-bg {
            position: absolute; width: 100%; height: 100%;
            background-size: cover; background-position: center;
            filter: grayscale(1) brightness(0.25);
            transition: 0.7s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .project:hover .project-bg { filter: grayscale(0) brightness(0.4); transform: scale(1.05); }

        .video-container {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 25; display: none; background: #000;
        }

        .video-container iframe { width: 100%; height: 100%; border: none; }

        .close-video {
            position: absolute; top: 20px; right: 20px; z-index: 30;
            background: var(--accent); color: #fff; padding: 10px 20px;
            cursor: pointer; font-size: 1rem; border: none; font-family: inherit;
        }

        .info { position: relative; z-index: 20; text-align: center; width: 90%; }
        .year { font-size: 1.4rem; color: var(--accent); letter-spacing: 12px; margin-bottom: 10px; }
        .title { font-size: 8vw; margin: 0; line-height: 0.9; letter-spacing: -4px; color: var(--text); cursor: pointer; }
        .title:hover { color: var(--accent); }

        footer {
            position: relative; z-index: 30; background: var(--text); color: #000;
            padding: 100px 5%; text-align: center;
        }
        .cta-call { font-size: 4vw; margin-bottom: 10px; }
        .mail-link { font-size: 8vw; color: #000; text-decoration: none; line-height: 0.8; display: block; word-wrap: break-word; }
        .mail-link:hover { color: var(--accent); }

        @media (max-width: 600px) {
            h1 { font-size: 18vw; }
            .title { font-size: 12vw; }
            .mail-link { font-size: 10vw; }
        }
    </style>
</head>
<body>
    <div class="grain"></div>

    <header>
        <h1>КИРИЛЛ<br><span style="color:var(--accent)">КУЗИН</span></h1>
    </header>

    <section class="project">
        <div class="project-bg" style="background-image: url('https://static.kinoafisha.info/k/trailers/1270/upload/trailers/ca78d28a4ada04ac58f80db9dcb58457.jpg')"></div>
        <div class="video-container" id="video-dedmoroz">
            <button class="close-video" onclick="closeVideo('video-dedmoroz')">ЗАКРЫТЬ [X]</button>
            <iframe src="https://www.youtube.com/embed/LvN3fe44O5s?autoplay=1" allow="autoplay; encrypted-media" allowfullscreen></iframe>
        </div>
        <div class="info">
            <div class="year">2025</div>
            <h2 class="title" onclick="openVideo('video-dedmoroz')">Письмо Деду Морозу</h2>
        </div>
    </section>

    <section class="project">
        <div class="project-bg" style="background-image: url('https://avatars.mds.yandex.net/i?id=da2e1f3979e26dcf54fe4caabc40cfc9_l-7045590-images-thumbs&n=13')"></div>
        <div class="video-container" id="video-sergiy">
            <button class="close-video" onclick="closeVideo('video-sergiy')">ЗАКРЫТЬ [X]</button>
            <iframe src="https://www.youtube.com/embed/CITR_Z3nGZM?autoplay=1" allow="autoplay; encrypted-media" allowfullscreen></iframe>
        </div>
        <div class="info">
            <div class="year">2025</div>
            <h2 class="title" onclick="openVideo('video-sergiy')">Сергий Против Нечисти</h2>
        </div>
    </section>

    <footer>
        <div class="cta-call">TEL: +7 903 769 72 43</div>
        <a href="mailto:bildyev@gmail.com" class="mail-link">KUZIN.DIRECTOR</a>
    </footer>

    <script>
        function openVideo(id) {
            document.getElementById(id).style.display = 'block';
        }
        function closeVideo(id) {
            var container = document.getElementById(id);
            var iframe = container.querySelector('iframe');
            var url = iframe.src;
            iframe.src = ''; // Останавливаем видео при закрытии
            iframe.src = url; 
            container.style.display = 'none';
        }
    </script>
</body>
</html>
